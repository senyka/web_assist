{% extends "base.html" %}
{% block title %}Чат с AI - OpenCode{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-9 col-xl-8">
        <div class="card shadow-sm">
            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0">💬 Чат с {{ model|default('Qwen') }}</h5>
                <button class="btn btn-outline-secondary btn-sm" onclick="clearChat()">🗑️ Очистить</button>
            </div>
            <div class="card-body p-0">
                <div id="chatContainer" class="p-3" style="height: 500px; overflow-y: auto; background: #fdfdfd;">
                    <div class="text-center text-muted mt-5">
                        <p>Начните диалог. Сообщения сохраняются только в текущей сессии.</p>
                    </div>
                </div>
                <div class="p-3 border-top bg-light">
                    <form id="chatForm" class="d-flex gap-2">
                        <input type="text" id="messageInput" class="form-control" placeholder="Введите сообщение..." required autocomplete="off">
                        <button type="submit" class="btn btn-primary" id="sendBtn">Отправить</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .msg { max-width: 80%; margin-bottom: 10px; padding: 10px 15px; border-radius: 12px; word-break: break-word; }
    .msg.user { background: #0d6efd; color: white; margin-left: auto; border-bottom-right-radius: 4px; }
    .msg.ai { background: #e9ecef; color: #212529; margin-right: auto; border-bottom-left-radius: 4px; }
    .msg .meta { font-size: 0.75em; opacity: 0.7; margin-bottom: 4px; }
    #chatContainer::-webkit-scrollbar { width: 8px; }
    #chatContainer::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
</style>

<script>
    const chatContainer = document.getElementById('chatContainer');
    const chatForm = document.getElementById('chatForm');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    function addMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `msg ${sender}`;
        const escapedText = text.replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
        div.innerHTML = `<div class="meta">${sender === 'user' ? 'Вы' : 'AI'} • ${new Date().toLocaleTimeString()}</div>${escapedText}`;
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    async function sendToAI(message) {
        addMessage(message, 'user');
        messageInput.disabled = true;
        sendBtn.disabled = true;
        sendBtn.textContent = '⏳ Думаю...';

        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'msg ai';
        loadingDiv.innerHTML = '<em>Генерация ответа...</em>';
        chatContainer.appendChild(loadingDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message})
            });
            const data = await res.json();
            
            if (res.ok) {
                chatContainer.removeChild(loadingDiv);
                addMessage(data.response, 'ai');
            } else {
                chatContainer.removeChild(loadingDiv);
                addMessage(`❌ Ошибка: ${data.error || 'Сервер не отвечает'}`, 'ai');
            }
        } catch (err) {
            chatContainer.removeChild(loadingDiv);
            addMessage('❌ Ошибка сети', 'ai');
        } finally {
            messageInput.disabled = false;
            sendBtn.disabled = false;
            sendBtn.textContent = 'Отправить';
            messageInput.focus();
        }
    }

    chatForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const msg = messageInput.value.trim();
        if (msg) {
            sendToAI(msg);
            messageInput.value = '';
        }
    });

    function clearChat() {
        if(confirm('Очистить текущий чат?')) {
            chatContainer.innerHTML = '<div class="text-center text-muted mt-5"><p>Чат очищен. Отправьте новое сообщение.</p></div>';
        }
    }
</script>
{% endblock %}
