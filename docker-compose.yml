version: '3.8'

services:
  # LightLDAP сервер
  ldap:
    image: osixia/openldap:1.5.0
    container_name: lightldap
    environment:
      LDAP_ORGANISATION: "OpenCode"
      LDAP_DOMAIN: "opencode.local"
      LDAP_ADMIN_PASSWORD: "adminpassword"
      LDAP_BASE_DN: "dc=opencode,dc=local"
    ports:
      - "389:389"
      - "636:636"
    volumes:
      - ./ldap-data:/var/lib/ldap
      - ./ldap-config:/etc/ldap/slapd.d
    command: --copy-service
    networks:
      - opencode-network
    restart: unless-stopped

  # Инициализация LDAP (добавление пользователей)
  ldap-init:
    image: osixia/openldap:1.5.0
    container_name: ldap-init
    environment:
      LDAP_BASE_DN: "dc=opencode,dc=local"
      LDAP_ADMIN_PASSWORD: "adminpassword"
    depends_on:
      - ldap
    volumes:
      - ./ldap-init.ldif:/container/service/slapd/assets/test/bootstrap.ldif
    command: ["bash", "-c", "sleep 10 && ldapadd -x -D \"cn=admin,dc=opencode,dc=local\" -w adminpassword -f /container/service/slapd/assets/test/bootstrap.ldif || true"]
    networks:
      - opencode-network

  # Ollama с моделью Qwen-7B
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama-data:/root/.ollama
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - video
    environment:
      - OLLAMA_HOST=0.0.0.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - opencode-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Веб-интерфейс и бэкенд
  webapp:
    build:
      context: ./webapp
      dockerfile: Dockerfile
    container_name: opencode-web
    ports:
      - "8080:80"
    environment:
      - LDAP_URI=ldap://ldap:389
      - LDAP_BASE_DN=dc=opencode,dc=local
      - LDAP_ADMIN_DN=cn=admin,dc=opencode,dc=local
      - LDAP_ADMIN_PASSWORD=adminpassword
      - OLLAMA_HOST=http://ollama:11434
      - SECRET_KEY=your-secret-key-change-in-production
      - DATABASE_URL=sqlite:///data/app.db
    volumes:
      - ./webapp-data:/app/data
    depends_on:
      - ldap
      - ollama
    networks:
      - opencode-network
    restart: unless-stopped

networks:
  opencode-network:
    driver: bridge
